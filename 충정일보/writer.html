<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>충정일보 - 기자</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cute+Font&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: #ffffff;
            font-family: Arial, sans-serif;
        }

        .page {
            min-height: 100vh;
            position: relative;
            padding-top: 20px;
        }

        .top-buttons {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 10px;
        }

        .top-buttons button,
        .write-footer button {
            border: 2px solid #7d7d7d;
            background: #fff;
            border-radius: 4px;
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
        }

        .center-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 70px;
        }

        .logo-wrap {
            display: inline-block;
            text-align: left;
        }

        .logo {
            font-size: 54px;
            font-weight: bold;
            letter-spacing: -2px;
            line-height: 1;
        }

        .logo .b1 { color: #4aa3ff; }
        .logo .b2 { color: #f15a29; }
        .logo .b3 { color: #f5a623; }
        .logo .b4 { color: #222; }
        .logo .b5 { color: #222; }
        .logo .b6 { color: #222; }
        .logo .b7 { color: #7cc7ff; }
        .logo .b8 { color: #f4b7b7; }
        .logo .b9 { color: #4aa3ff; }
        .logo .b10 { color: #46b96c; }

        .logo-sub {
            font-size: 11px;
            text-align: right;
            margin-top: 3px;
            color: #333;
            width: 100%;
        }

        .search-wrap {
            margin-top: 22px;
            width: 460px;
        }

        .search-box {
            display: flex;
            align-items: center;
            border: 3px solid #8a8a8a;
            background: #f8f8f8;
            border-radius: 4px;
            padding: 0 10px;
            height: 48px;
        }

        .search-icon {
            font-size: 24px;
            color: #b1b1b1;
            margin-right: 8px;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            color: #555;
        }

        .write-section {
            width: 400px;
            margin: 40px auto 0;
            padding-bottom: 30px;
            display: none;
        }

        .write-section.show {
            display: block;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 18px;
            margin-bottom: 8px;
            color: #222;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            border: 3px solid #9b9b9b;
            border-radius: 4px;
            background: #f8f8f8;
            font-size: 16px;
            padding: 10px 12px;
            outline: none;
        }

        .form-group input {
            height: 44px;
        }

        .form-group textarea {
            min-height: 140px;
            resize: none;
        }

        .write-footer {
            text-align: center;
            margin-top: 14px;
        }

        .result-box {
            width: 700px;
            margin: 40px auto 0;
            padding-bottom: 40px;
        }

        .article-card {
            margin-bottom: 34px;
            border: none;
            background: transparent;
            padding: 0;
        }

        .article-title {
            margin: 0 0 8px;
            font-size: 38px;
            font-family: 'Cute Font', cursive;
            text-align: center;
            font-weight: bold;
        }

        .article-reporter-row {
            width: 400px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .article-reporter-photo {
            width: 16px;
            height: 16px;
            object-fit: cover;
            display: block;
        }

        .article-reporter-name {
            font-size: 12px;
            color: #333;
        }

        .article-main-photo {
            display: block;
            width: 400px;
            margin: 0 auto 10px;
        }

        .article-content {
            width: 400px;
            margin: 0 auto;
            font-size: 20px;
            font-family: 'Cute Font', cursive;
            line-height: 2;
            white-space: pre-wrap;
            color: #222;
        }

        .empty-text {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-buttons">
            <button onclick="toggleWriteSection()">기사 작성</button>
            <button onclick="logout()">로그아웃</button>
        </div>

        <div class="center-box">
            <div class="logo-wrap">
                <div class="logo">
                    <span class="b1">C</span><span class="b2">h</span><span class="b3">o</span><span class="b4">o</span><span class="b5">o</span><span class="b6">o</span><span class="b7">o</span><span class="b8">o</span><span class="b9">n</span><span class="b10">g</span>
                </div>
                <div class="logo-sub">정일보</div>
            </div>

            <div class="search-wrap">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input id="searchInput" class="search-input" type="text" placeholder="오늘은 금요일" onkeydown="handleSearchEnter(event)">
                </div>
            </div>
        </div>

        <div id="writeSection" class="write-section">
            <div class="form-group">
                <label for="titleInput">기사 제목</label>
                <input type="text" id="titleInput">
            </div>

            <div class="form-group">
                <label for="reporterPhotoInput">기자 사진 파일 이름</label>
                <input type="text" id="reporterPhotoInput" placeholder="예: reporter.jpg">
            </div>

            <div class="form-group">
                <label for="writerNameInput">기자 이름</label>
                <input type="text" id="writerNameInput" readonly>
            </div>

            <div class="form-group">
                <label for="newsPhotoInput">기사 사진 파일 이름</label>
                <input type="text" id="newsPhotoInput" placeholder="예: sample.jpg">
            </div>

            <div class="form-group">
                <label for="contentInput">기사 본문</label>
                <textarea id="contentInput"></textarea>
            </div>

            <div class="write-footer">
                <button onclick="submitNews()">등록</button>
            </div>
        </div>

        <div id="resultBox" class="result-box"></div>
    </div>

    <script>
        let currentUser = null;

        async function init() {
            const token = localStorage.getItem('myToken');

            if (!token) {
                location.href = '/';
                return;
            }

            const res = await fetch('/api/verify', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            const data = await res.json();

            if (!data.success) {
                alert('로그인이 만료되었습니다.');
                localStorage.removeItem('myToken');
                location.href = '/';
                return;
            }

            if (data.user.role !== '기자') {
                alert('기자만 접근 가능합니다.');
                location.href = '/';
                return;
            }

            currentUser = data.user;
            document.getElementById('writerNameInput').value = currentUser.userName;
        }

        function toggleWriteSection() {
            document.getElementById('writeSection').classList.toggle('show');
        }

        function logout() {
            localStorage.removeItem('myToken');
            location.href = '/';
        }

        function handleSearchEnter(event) {
            if (event.key === 'Enter') {
                searchNews();
            }
        }

        async function searchNews() {
            const keyword = document.getElementById('searchInput').value.trim();
            const res = await fetch('/api/news/search?q=' + encodeURIComponent(keyword));
            const list = await res.json();
            renderNews(list);
        }

        async function submitNews() {
            const token = localStorage.getItem('myToken');
            const title = document.getElementById('titleInput').value.trim();
            const reporterPhoto = document.getElementById('reporterPhotoInput').value.trim();
            const reporterName = document.getElementById('writerNameInput').value.trim();
            const newsPhoto = document.getElementById('newsPhotoInput').value.trim();
            const content = document.getElementById('contentInput').value.trim();

            const res = await fetch('/api/news/write', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    title,
                    reporterPhoto,
                    reporterName,
                    newsPhoto,
                    content
                })
            });

            const data = await res.json();

            if (data.success) {
                alert('기사가 등록되었습니다.');
                document.getElementById('titleInput').value = '';
                document.getElementById('reporterPhotoInput').value = '';
                document.getElementById('newsPhotoInput').value = '';
                document.getElementById('contentInput').value = '';
                document.getElementById('writeSection').classList.remove('show');
            } else {
                alert(data.message || '기사 등록 실패');
            }
        }

        function renderNews(list) {
            const box = document.getElementById('resultBox');
            box.innerHTML = '';

            if (!list.length) {
                box.innerHTML = '<div class="empty-text">검색 결과가 없습니다.</div>';
                return;
            }

            list.forEach(article => {
                box.appendChild(createArticleCard(article));
            });
        }

        function createArticleCard(article) {
            const card = document.createElement('article');
            card.className = 'article-card';

            const title = document.createElement('h2');
            title.className = 'article-title';
            title.textContent = article.title;

            const reporterRow = document.createElement('div');
            reporterRow.className = 'article-reporter-row';

            const reporterPhoto = document.createElement('img');
            reporterPhoto.className = 'article-reporter-photo';
            reporterPhoto.src = article.reporter_photo ? '/static/' + article.reporter_photo : '';
            reporterPhoto.alt = article.reporter_name + ' 기자 사진';

            const reporterName = document.createElement('span');
            reporterName.className = 'article-reporter-name';
            reporterName.textContent = article.reporter_name + ' 기자';

            reporterRow.appendChild(reporterPhoto);
            reporterRow.appendChild(reporterName);

            const newsPhoto = document.createElement('img');
            newsPhoto.className = 'article-main-photo';
            newsPhoto.src = article.news_photo ? '/static/' + article.news_photo : '';
            newsPhoto.alt = article.title + ' 기사 사진';

            const content = document.createElement('p');
            content.className = 'article-content';
            content.textContent = article.content;

            card.appendChild(title);
            card.appendChild(reporterRow);

            if (article.news_photo) {
                card.appendChild(newsPhoto);
            }

            card.appendChild(content);

            return card;
        }

        init();
    </script>
</body>
</html>
